<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Portal Resmi NU Baleharjo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #welcome {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      text-align: center;
      transition: opacity 0.4s ease;
    }
    #welcome.hide {
      opacity: 0;
      pointer-events: none;
    }
    #welcome h1 {
      margin-bottom: 10px;
    }
    #welcome button {
      padding: 15px 30px;
      background: #1a7a3c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }
    #welcome button:hover {
      background: #145e2e;
    }
    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
    iframe.show {
      display: block;
    }
  </style>
</head>
<body>

  <div id="welcome">
    <div>
      <h1>Selamat Datang di Portal Resmi NU Baleharjo</h1>
      <p>Silakan klik tombol di bawah ini untuk masuk ke website:</p>
      <button onclick="bukaWeb()">Masuk</button>
    </div>
  </div>

  <iframe id="webFrame"
    src=""
    allow="clipboard-read; clipboard-write">
  </iframe>

  <script>
    function bukaWeb() {
      const frame = document.getElementById('webFrame');
      const welcome = document.getElementById('welcome');
      frame.src = "https://script.google.com/macros/s/AKfycbzYPMyWY0ChkAEmWmUXCEfqz-TuPTuS4Fc8FbBrbcX3d65pp8XB8PACOFFSVxoeEKKM/exec";
      frame.classList.add('show');
      welcome.classList.add('hide');
    }
  </script>

</body>
</html>
